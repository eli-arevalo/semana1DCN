name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el codigo del repositorio
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Configura Java 21
      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Compila el proyecto con Maven
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Inicia sesión en Docker Hub
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # 5. Construye y sube la imagen a Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/semana1dcn:latest

      # 6. Despliega en AWS EC2 via SSH
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop semana1dcn || true
            docker rm semana1dcn || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/semana1dcn:latest
            docker run -d --name semana1dcn -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/semana1dcn:latest
